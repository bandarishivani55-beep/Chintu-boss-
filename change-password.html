!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🔒 Change Password</h1>

<input
type="password"
id="currentPassword"
placeholder="Current Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm New Password">

<button onclick="changePassword()">
🔄 Change Password
</button>

<button onclick="location.href='profile.html'">
⬅ Back to Profile
</button>

</div>

<script>

function changePassword(){

let current=document.getElementById("currentPassword").value;
let newPass=document.getElementById("newPassword").value;
let confirm=document.getElementById("confirmPassword").value;

let savedPassword=localStorage.getItem("userPassword") || "1234";

if(current!==savedPassword){
alert("Current password is incorrect.");
return;
}

if(newPass.length<6){
alert("New password must be at least 6 characters.");
return;
}

if(newPass!==confirm){
alert("Passwords do not match.");
return;
}

localStorage.setItem("userPassword",newPass);

alert("Password changed successfully!");

location.href="profile.html";

}

</script>

</body>
</html>
