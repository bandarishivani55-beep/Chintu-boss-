<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:350px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:20px;
}

h1{
text-align:center;
color:gold;
margin-bottom:20px;
}

#display{
width:100%;
height:60px;
background:#222;
border:2px solid gold;
border-radius:10px;
color:#fff;
font-size:28px;
text-align:right;
padding:10px;
margin-bottom:20px;
outline:none;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:60px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:#fff;
transition:.3s;
}

button:hover{
background:gold;
color:#000;
}

.back{
width:100%;
margin-top:20px;
padding:15px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
font-size:18px;
border-radius:30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧮 Calculator</h1>

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="clearDisplay()">C</button>
<button onclick="append('/')">÷</button>
<button onclick="append('*')">×</button>
<button onclick="append('-')">−</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('+')">+</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="calculate()">=</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('.')">.</button>

<button onclick="append('0')" style="grid-column:span 4;">0</button>

</div>

<button class="back" onclick="location.href='home-tools.html'">
⬅ Back to Home Tools
</button>

</div>

<script>
let display=document.getElementById("display");

function append(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function calculate(){
try{
display.value=eval(display.value);
}catch{
alert("Invalid Expression");
display.value="";
}
}
</script>

</body>
</html>
