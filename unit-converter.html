<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

select,
input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:gold;
}
</style>
</head>

<body>

<div class="container">

<h1>📏 Unit Converter</h1>

<select id="unit">
<option value="km">Kilometers ➜ Miles</option>
<option value="mile">Miles ➜ Kilometers</option>
<option value="kg">Kilograms ➜ Pounds</option>
<option value="lb">Pounds ➜ Kilograms</option>
</select>

<input
type="number"
id="value"
placeholder="Enter Value">

<button onclick="convertUnit()">
Convert
</button>

<div id="result"></div>

<button onclick="location.href='utility-features.html'">
⬅ Back to Utility Features
</button>

</div>

<script>

function convertUnit(){

let value=parseFloat(document.getElementById("value").value);
let unit=document.getElementById("unit").value;
let answer="";

if(isNaN(value)){
alert("Please enter a valid value.");
return;
}

switch(unit){

case "km":
answer=(value*0.621371).toFixed(2)+" Miles";
break;

case "mile":
answer=(value*1.60934).toFixed(2)+" Kilometers";
break;

case "kg":
answer=(value*2.20462).toFixed(2)+" Pounds";
break;

case "lb":
answer=(value/2.20462).toFixed(2)+" Kilograms";
break;

}

document.getElementById("result").innerHTML=
"Result: " + answer;

}

</script>

</body>
</html>
