<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner - Chintu Boss</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

#reader{
width:100%;
margin:20px auto;
border:2px solid gold;
border-radius:10px;
overflow:hidden;
}

#result{
margin-top:20px;
padding:12px;
background:#222;
border-radius:10px;
color:gold;
word-break:break-word;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<h1>📷 QR Scanner</h1>

<div id="reader"></div>

<div id="result">
Scan a QR code...
</div>

<button onclick="location.href='utility-features.html'">
⬅ Back to Utility Features
</button>

</div>

<script>

function onScanSuccess(decodedText){

document.getElementById("result").innerHTML=
"✅ Result:<br><br>"+decodedText;

}

const html5QrCode=new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

html5QrCode.render(onScanSuccess);

</script>

</body>
</html>
