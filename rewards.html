<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewards - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

.reward{
background:#222;
border:2px solid gold;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.reward h3{
color:gold;
margin-bottom:8px;
}

.reward p{
color:#ddd;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Rewards</h1>

<div class="reward">
<h3>🥉 Bronze Badge</h3>
<p>Complete 5 study sessions.</p>
</div>

<div class="reward">
<h3>🥈 Silver Badge</h3>
<p>Maintain 80% attendance.</p>
</div>

<div class="reward">
<h3>🥇 Gold Badge</h3>
<p>Achieve a CGPA above 9.0.</p>
</div>

<div class="reward">
<h3>👑 Champion Badge</h3>
<p>Complete all your goals successfully.</p>
</div>

<button onclick="location.href='home.html'">
⬅ Back to Home
</button>

</div>

</body>
</html>
