<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Mode - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

p{
color:#ddd;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 15px gold;
}

#status{
margin-top:20px;
font-size:20px;
color:gold;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>🎯 Focus Mode</h1>

<p>Set your focus session in minutes.</p>

<input
type="number"
id="minutes"
placeholder="Enter Minutes">

<button onclick="startFocus()">
Start Focus
</button>

<div id="status"></div>

<button onclick="location.href='home-tools.html'">
⬅ Back to Home Tools
</button>

</div>

<script>

let timer;

function startFocus(){

let minutes=parseInt(document.getElementById("minutes").value);

if(isNaN(minutes) || minutes<=0){
alert("Please enter valid minutes.");
return;
}

let seconds=minutes*60;

clearInterval(timer);

timer=setInterval(function(){

let min=Math.floor(seconds/60);
let sec=seconds%60;

document.getElementById("status").innerHTML=
"⏳ "+min+"m "+sec+"s";

if(seconds<=0){

clearInterval(timer);

document.getElementById("status").innerHTML=
"✅ Focus Session Completed!";

alert("Great Job! Focus Session Finished.");

}

seconds--;

},1000);

}

</script>

</body>
</html>
