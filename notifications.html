<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
color:gold;
margin-bottom:25px;
}

.notification{
background:#111;
border:2px solid gold;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.notification h3{
color:gold;
margin-bottom:8px;
}

.notification p{
color:#ddd;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>

</head>
<body>

<div class="container">

<h1>🔔 Notifications</h1>

<div class="notification">
<h3>📚 Study Reminder</h3>
<p>Don't forget to complete today's study session.</p>
</div>

<div class="notification">
<h3>📝 Notes Reminder</h3>
<p>Review your saved notes before tomorrow's class.</p>
</div>

<div class="notification">
<h3>🎯 Goal Reminder</h3>
<p>Check your goals and track today's progress.</p>
</div>

<div class="notification">
<h3>📅 Upcoming Event</h3>
<p>Remember to check your calendar for scheduled events.</p>
</div>

<button onclick="location.href='home.html'">
⬅ Back to Home
</button>

</div>

</body>
</html>
