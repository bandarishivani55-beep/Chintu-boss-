<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

select{
width:100%;
padding:15px;
margin-bottom:20px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}

#status{
margin-top:15px;
color:gold;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🌐 Language</h1>

<select id="language">
<option value="English">English</option>
<option value="Telugu">Telugu</option>
<option value="Hindi">Hindi</option>
<option value="Tamil">Tamil</option>
<option value="Kannada">Kannada</option>
</select>

<button onclick="saveLanguage()">
💾 Save Language
</button>

<div id="status"></div>

<button onclick="location.href='settings.html'">
⬅ Back to Settings
</button>

</div>

<script>

window.onload=function(){

let lang=localStorage.getItem("language");

if(lang){
document.getElementById("language").value=lang;
}

}

function saveLanguage(){

let lang=document.getElementById("language").value;

localStorage.setItem("language",lang);

document.getElementById("status").innerHTML=
"✅ Language saved: "+lang;

}

</script>

</body>
</html>
