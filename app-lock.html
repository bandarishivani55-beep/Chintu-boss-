<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Lock - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 15px gold;
}

#status{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🔒 App Lock</h1>

<input
type="password"
id="pin"
placeholder="Create 4-digit PIN"
maxlength="4">

<button onclick="savePin()">
Save PIN
</button>

<input
type="password"
id="unlockPin"
placeholder="Enter PIN to Unlock"
maxlength="4">

<button onclick="unlockApp()">
Unlock
</button>

<div id="status"></div>

<button onclick="location.href='home-tools.html'">
⬅ Back to Home Tools
</button>

</div>

<script>

function savePin(){

let pin=document.getElementById("pin").value;

if(pin.length!==4){
alert("PIN must be 4 digits.");
return;
}

localStorage.setItem("appPin",pin);

document.getElementById("status").innerHTML=
"✅ PIN Saved Successfully";

document.getElementById("pin").value="";

}

function unlockApp(){

let savedPin=localStorage.getItem("appPin");
let entered=document.getElementById("unlockPin").value;

if(savedPin===null){
alert("Please create a PIN first.");
return;
}

if(entered===savedPin){

document.getElementById("status").innerHTML=
"🔓 App Unlocked Successfully";

}
else{

document.getElementById("status").innerHTML=
"❌ Incorrect PIN";

}

document.getElementById("unlockPin").value="";

}

</script>

</body>
</html>s
