<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 15px gold;
}

#downloadList{
margin-top:20px;
text-align:left;
}

.item{
background:#222;
border:1px solid gold;
border-radius:10px;
padding:12px;
margin-bottom:10px;
color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>⬇️ Downloads</h1>

<input
type="text"
id="fileName"
placeholder="Enter File Name">

<button onclick="addDownload()">
Add Download
</button>

<div id="downloadList"></div>

<button onclick="location.href='home-tools.html'">
⬅ Back to Home Tools
</button>

</div>

<script>

let downloads=JSON.parse(localStorage.getItem("downloads"))||[];

displayDownloads();

function addDownload(){

let file=document.getElementById("fileName").value.trim();

if(file===""){
alert("Please enter a file name.");
return;
}

downloads.push(file);

localStorage.setItem(
"downloads",
JSON.stringify(downloads)
);

document.getElementById("fileName").value="";

displayDownloads();

}

function displayDownloads(){

let list=document.getElementById("downloadList");

list.innerHTML="";

downloads.forEach(function(file){

list.innerHTML+=`
<div class="item">
📥 ${file}
</div>
`;

});

}

</script>

</body>
</html>
