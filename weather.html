<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}

#weatherResult{
margin-top:20px;
padding:15px;
background:#222;
border-radius:10px;
color:gold;
font-size:18px;
line-height:1.8;
}

.back{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌤️ Weather</h1>

<input
type="text"
id="city"
placeholder="Enter City Name">

<button onclick="getWeather()">
Check Weather
</button>

<div id="weatherResult">
Enter a city to view weather.
</div>

<button
class="back"
onclick="location.href='utility-features.html'">
⬅ Back to Utility Features
</button>

</div>

<script>

function getWeather(){

let city=document.getElementById("city").value.trim();

if(city===""){
alert("Please enter a city.");
return;
}

/* Demo weather */
document.getElementById("weatherResult").innerHTML=
`
📍 City : ${city}<br><br>
🌡 Temperature : 30°C<br>
☁ Condition : Sunny<br>
💧 Humidity : 60%<br>
🌬 Wind : 12 km/h
`;

}

</script>

</body>
</html>
