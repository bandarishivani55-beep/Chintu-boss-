<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Cards - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:25px;
}

.card{
background:#222;
border:2px solid gold;
border-radius:15px;
padding:40px 20px;
min-height:180px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.card:hover{
box-shadow:0 0 15px gold;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
font-size:18px;
font-weight:bold;
border:none;
border-radius:30px;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>

</head>
<body>

<div class="container">

<h1>🃏 Flash Cards</h1>

<div class="card" onclick="flipCard()" id="flashCard">
Question:<br><br>
What does CSS stand for?
</div>

<button onclick="location.href='study-features.html'">
⬅ Back to Study Features
</button>

</div>

<script>
let flipped=false;

function flipCard(){

const card=document.getElementById("flashCard");

if(!flipped){

card.innerHTML=
"Answer:<br><br>Cascading Style Sheets";

flipped=true;

}else{

card.innerHTML=
"Question:<br><br>What does CSS stand for?";

flipped=false;

}

}
</script>

</body>
</html>
