<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottom Navigation - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding-bottom:80px;
}

.content{
padding:30px;
text-align:center;
}

.content h1{
color:gold;
margin-bottom:10px;
}

.content p{
color:#ccc;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#111;
border-top:2px solid gold;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
color:#fff;
font-size:14px;
transition:.3s;
}

.nav-item:hover{
color:gold;
transform:scale(1.05);
}

.icon{
font-size:24px;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="content">
<h1>📱 Bottom Navigation</h1>
<p>Use the navigation bar below to move between app sections.</p>
</div>

<div class="bottom-nav">

<div class="nav-item" onclick="location.href='dashboard.html'">
<div class="icon">🏠</div>
<div>Home</div>
</div>

<div class="nav-item" onclick="location.href='study-features.html'">
<div class="icon">📚</div>
<div>Study</div>
</div>

<div class="nav-item" onclick="location.href='home-tools.html'">
<div class="icon">🧰</div>
<div>Tools</div>
</div>

<div class="nav-item" onclick="location.href='profile.html'">
<div class="icon">👤</div>
<div>Profile</div>
</div>

<div class="nav-item" onclick="location.href='settings.html'">
<div class="icon">⚙️</div>
<div>Settings</div>
</div>

</div>

</body>
</html>
