<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chintu Boss - Splash Screen</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#000;
overflow:hidden;
}

.container{
text-align:center;
animation:fadeIn 1.5s ease-in-out;
}

.logo{
width:150px;
height:150px;
border-radius:40%;
border: none;
box-shadow: none;
margin-bottom:20px;
object-fit: cover;
  
  padding: 0px;
  overflow: hidden;}

h1{
color:pink;
font-size:38px;
margin-bottom:10px;
}

p{
color:#fff;
font-size:18px;
letter-spacing:1px;
}

.loader{
width:220px;
height:8px;
background:#333;
border-radius:20px;
margin:30px auto 0;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(to right,#FFD700,#D4AF37);
animation:loading 3s linear forwards;
}

@keyframes loading{
from{
width:0%;
}
to{
width:100%;
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>
<body>

<div class="container">

<img src="logo.png" alt="Chintu Boss Logo" class="logo">

<h1>CHINTU BOSS</h1>

<p>Your Smart Student Companion</p>

<div class="loader">
<div class="bar"></div>
</div>

</div>

<script>
setTimeout(function(){
window.location.href="login.html";
},3000);
</script>

</body>
</html>
