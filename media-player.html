<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Player - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:20px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
}

audio,video{
width:100%;
margin-top:20px;
border-radius:10px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🎵 Media Player</h1>

<input
type="file"
id="mediaFile"
accept="audio/*,video/*">

<button onclick="playMedia()">
Play Media
</button>

<div id="player"></div>

<button onclick="location.href='home-tools.html'">
⬅ Back to Home Tools
</button>

</div>

<script>

function playMedia(){

const file=document.getElementById("mediaFile").files[0];

if(!file){
alert("Please choose an audio or video file.");
return;
}

const url=URL.createObjectURL(file);

const player=document.getElementById("player");

if(file.type.startsWith("audio")){

player.innerHTML=`
<audio controls autoplay>
<source src="${url}" type="${file.type}">
</audio>
`;

}

else if(file.type.startsWith("video")){

player.innerHTML=`
<video controls autoplay>
<source src="${url}" type="${file.type}">
</video>
`;

}

else{

alert("Unsupported file type.");

}

}

</script>

</body>
</html>
