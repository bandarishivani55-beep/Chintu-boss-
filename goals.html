!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
background:#222;
color:#fff;
border:2px solid gold;
border-radius:10px;
font-size:16px;
outline:none;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 Goals</h1>

<input
type="text"
id="goalTitle"
placeholder="Enter Goal Title">

<textarea
id="goalDescription"
placeholder="Describe your goal..."></textarea>

<button onclick="saveGoal()">
💾 Save Goal
</button>

<button onclick="location.href='home.html'">
⬅ Back to Home
</button>

</div>

<script>
document.getElementById("goalTitle").value=
localStorage.getItem("goalTitle")||"";

document.getElementById("goalDescription").value=
localStorage.getItem("goalDescription")||"";

function saveGoal(){

let title=document.getElementById("goalTitle").value.trim();
let description=document.getElementById("goalDescription").value.trim();

if(title===""||description===""){
alert("Please fill all fields.");
return;
}

localStorage.setItem("goalTitle",title);
localStorage.setItem("goalDescription",description);

alert("Goal saved successfully!");

}
</script>

</body>
</html>
