<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Summary - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 0 20px rgba(255,215,0,.3);
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid gold;
margin:0 auto 20px;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
background:#222;
}

h2{
color:gold;
margin-bottom:10px;
}

.info{
background:#222;
border:1px solid gold;
border-radius:10px;
padding:12px;
margin:10px 0;
text-align:left;
}

.info strong{
color:gold;
}

.btn{
width:100%;
padding:15px;
margin-top:20px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
font-size:18px;
font-weight:bold;
border:none;
border-radius:30px;
cursor:pointer;
}

.btn:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<div class="profile-img">👤</div>

<h2 id="name">User</h2>

<div class="info">
<strong>Name:</strong>
<span id="userName"></span>
</div>

<div class="info">
<strong>Email:</strong>
<span id="userEmail"></span>
</div>

<div class="info">
<strong>Status:</strong>
Student
</div>

<button class="btn" onclick="location.href='dashboard.html'">
⬅ Back to Dashboard
</button>

</div>

<script>
document.getElementById("name").innerHTML =
localStorage.getItem("name") || "User";

document.getElementById("userName").innerHTML =
localStorage.getItem("name") || "User";

document.getElementById("userEmail").innerHTML =
localStorage.getItem("email") || "Not Available";
</script>

</body>
</html>
