<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:25px;
text-align:center;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid gold;
margin:0 auto 20px;
background:#222;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
}

h1{
color:gold;
margin-bottom:10px;
}

.info{
text-align:left;
margin:20px 0;
}

.info p{
margin:10px 0;
padding:10px;
background:#222;
border-radius:10px;
border:1px solid gold;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:linear-gradient(to right,#FFD700,#D4AF37);
color:#000;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px gold;
}
</style>
</head>

<body>

<div class="container">

<div class="profile-img">👤</div>

<h1>My Profile</h1>

<div class="info">
<p><strong>Name:</strong> <span id="name">Guest User</span></p>
<p><strong>Email:</strong> <span id="email">guest@example.com</span></p>
<p><strong>Phone:</strong> <span id="phone">Not Available</span></p>
</div>

<button onclick="location.href='edit-profile.html'">
✏ Edit Profile
</button>

<button onclick="location.href='change-password.html'">
🔒 Change Password
</button>

<button onclick="location.href='about.html'">
ℹ About
</button>

<button onclick="location.href='help-support.html'">
🛠 Help & Support
</button>

<button onclick="location.href='dashboard.html'">
⬅ Back to Dashboard
</button>

</div>

<script>

window.onload=function(){

document.getElementById("name").innerHTML=
localStorage.getItem("profileName") || "Guest User";

document.getElementById("email").innerHTML=
localStorage.getItem("profileEmail") || "guest@example.com";

document.getElementById("phone").innerHTML=
localStorage.getItem("profilePhone") || "Not Available";

}

</script>

</body>
</html>
