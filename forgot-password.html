<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Chintu Boss</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:400px;
background:#111;
padding:30px;
border:2px solid gold;
border-radius:20px;
box-shadow:0 0 20px rgba(255,215,0,.4);
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

p{
color:#ddd;
margin-bottom:20px;
font-size:15px;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
background:#222;
border:2px solid gold;
border-radius:10px;
color:#fff;
font-size:16px;
outline:none;
}

input::placeholder{
color:#aaa;
}

button{
width:100%;
padding:15px;
background:linear-gradient(to right,#FFD700,#D4AF37);
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

button:hover{
box-shadow:0 0 15px gold;
}

a{
color:gold;
text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h1>🔑 Forgot Password</h1>

<p>Enter your registered email address.</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<button onclick="resetPassword()">
Continue
</button>

<a href="login.html">⬅ Back to Login</a>

</div>

<script>
function resetPassword(){

let email=document.getElementById("email").value.trim();
let savedEmail=localStorage.getItem("email");

if(email===""){
alert("Please enter your email.");
return;
}

if(email===savedEmail){

alert("Email verified successfully.");

window.location.href="otp-verification.html";

}else{

alert("Email not found.");

}

}
</script>

</body>
</html>
